name: On PRs - Mac Matrix

on:
  pull_request:

jobs:
  MacOS-latest:
    name: 'macOS'
    runs-on: macos-latest

    steps:
      - name: Test
        run: |
          nc -l 8001 &
          python -m http.server 8002 --bind 127.0.0.1 &
          python3 -m http.server 8003 --bind 127.0.0.1 &
          netstat -anv

  MacOS-15:
    name: 'macOS'
    runs-on: macos-15

    steps:
      - name: Test
        run: |
          nc -l 8001 &
          python -m http.server 8002 --bind 127.0.0.1 &
          python3 -m http.server 8003 --bind 127.0.0.1 &
          netstat -anv
